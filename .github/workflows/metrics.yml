# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Medias
        uses: lowlighter/metrics@latest
        with:
          filename: media.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_order: rss, anilist
          config_timezone: Asia/Shanghai
          output_action: gist
          committer_gist: ${{ secrets.GIST }}
          plugin_anilist: yes
          plugin_anilist_medias: anime
          plugin_anilist_sections: characters
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
          plugin_anilist_shuffle: no
          plugin_anilist_user: AmeMika
          plugin_rss: yes
          plugin_rss_limit: 3
          plugin_rss_source: https://pool.pages.dev/atom.xml

      - name: Anilist
        uses: lowlighter/metrics@latest
        with:
          filename: anilist.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_order: anilist
          config_timezone: Asia/Shanghai
          output_action: gist
          committer_gist: ${{ secrets.GIST }}
          plugin_anilist: yes
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites,watching,characters
          plugin_anilist_limit: 1
          plugin_anilist_limit_characters: 22
          plugin_anilist_shuffle: no
          plugin_anilist_user: AmeMika
